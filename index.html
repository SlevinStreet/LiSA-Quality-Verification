<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LiSA Digital Compliance &amp; Verification Platform</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="description"
    content="Liberia Standards Authority (LiSA) digital quality certificate registry and compliance verification portal. Secure institutional gateway.">
  <style>
    /* ── Login Form Validation Styles ── */
    .global-error-banner {
      display: none;
      align-items: flex-start;
      gap: 10px;
      background-color: #fef2f2;
      border: 1px solid #f87171;
      color: #b91c1c;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 600;
      margin-bottom: 18px;
      animation: bannerSlideIn 0.25s ease;
    }

    .global-error-banner.show {
      display: flex;
    }

    .global-error-banner svg {
      flex-shrink: 0;
      margin-top: 1px;
    }

    @keyframes bannerSlideIn {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .inline-error {
      color: #ef4444;
      font-size: 11.5px;
      font-weight: 600;
      margin-top: 5px;
      display: none;
    }

    .inline-error.show {
      display: block;
    }

    .input-control.error {
      border-color: #ef4444 !important;
      background-color: #fef2f2 !important;
    }
  </style>
</head>

<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div style="display: flex; justify-content: center; margin-bottom: 24px;">
        <img src="logo.jpg" alt="LiSA Logo" style="height: 64px; width: auto; border-radius: 8px;">
      </div>
      <h2>LiSA</h2>
      <p class="login-subtitle">Liberia Standards Authority Compliance Portal</p>

      <form id="lisa-login-form" novalidate>

        <!-- Global Error Banner (credential / server errors) -->
        <div class="global-error-banner" id="global-error-banner" role="alert">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span id="global-error-text"></span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="login-email">Authorized Email Address</label>
          <input type="email" id="login-email" class="input-control" placeholder="Email Address" autocomplete="email">
          <div class="inline-error" id="error-login-email"></div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="login-password">System Password</label>
          <input type="password" id="login-password" class="input-control" placeholder="Password">
          <div class="inline-error" id="error-login-password"></div>
        </div>

        <button type="submit" class="btn-primary">
          <span>Authorize and Enter</span>
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" />
          </svg>
        </button>

      </form>

    </div>
  </div>

  <!-- InsForge SDK client — loaded as ES module so window.insforgeClient
       is available before state.js runs and before DOMContentLoaded fires. -->
  <!-- Runtime config bridge: loads window.__LISA_CONFIG__ from gitignored config.js -->
  <script src="config.js"></script>
  <script type="module" src="insforge-client.js"></script>
  <!-- State Coordination scripts -->
  <script src="state.js"></script>
  <script src="navigation.js"></script>
  <script>

    // ── Validation Helpers ──────────────────────────────────────────
    function showFieldError(inputId, message) {
      const input = document.getElementById(inputId);
      const errorEl = document.getElementById('error-' + inputId);
      if (input) input.classList.add('error');
      if (errorEl) {
        errorEl.textContent = message;
        errorEl.classList.add('show');
      }
    }

    function clearFieldError(inputId) {
      const input = document.getElementById(inputId);
      const errorEl = document.getElementById('error-' + inputId);
      if (input) input.classList.remove('error');
      if (errorEl) {
        errorEl.textContent = '';
        errorEl.classList.remove('show');
      }
    }

    function showGlobalError(message) {
      const banner = document.getElementById('global-error-banner');
      const text = document.getElementById('global-error-text');
      if (banner && text) {
        text.textContent = message;
        banner.classList.add('show');
      }
    }

    function hideGlobalError() {
      const banner = document.getElementById('global-error-banner');
      if (banner) banner.classList.remove('show');
    }

    // ── Real-time (blur) inline validation ─────────────────────────
    const emailInput = document.getElementById('login-email');
    const passwordInput = document.getElementById('login-password');

    emailInput.addEventListener('blur', () => {
      const val = emailInput.value.trim();
      if (!val) {
        showFieldError('login-email', 'Email is required');
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
        showFieldError('login-email', 'Invalid email format');
      } else {
        clearFieldError('login-email');
      }
    });

    emailInput.addEventListener('input', () => {
      clearFieldError('login-email');
      hideGlobalError();
    });

    passwordInput.addEventListener('blur', () => {
      const val = passwordInput.value;
      if (!val) {
        showFieldError('login-password', 'Password is required');
      } else if (val.length < 8) {
        showFieldError('login-password', 'Password must be at least 8 characters');
      } else {
        clearFieldError('login-password');
      }
    });

    passwordInput.addEventListener('input', () => {
      clearFieldError('login-password');
      hideGlobalError();
    });

    // ── Form Submission ─────────────────────────────────────────────
    document.getElementById('lisa-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideGlobalError();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Inline validation before submitting
      let hasErrors = false;

      if (!email) {
        showFieldError('login-email', 'Email is required');
        hasErrors = true;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showFieldError('login-email', 'Invalid email format');
        hasErrors = true;
      }

      if (!password) {
        showFieldError('login-password', 'Password is required');
        hasErrors = true;
      } else if (password.length < 8) {
        showFieldError('login-password', 'Password must be at least 8 characters');
        hasErrors = true;
      }

      if (hasErrors) {
        showGlobalError('Please fix the errors below before continuing.');
        return;
      }

      // Disable button to prevent double-submit
      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.querySelector('span').textContent = 'Verifying...';

      try {
        const session = await window.lisaState.loginWithPassword(email, password);
        if (session.role === 'supervisor') {
          window.location.href = 'supervisor.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      } catch (err) {
        const msg = err?.message || '';
        // Map common error messages to user-friendly ones
        let friendlyMsg = 'Incorrect user email or password. Please try again.';
        if (msg.toLowerCase().includes('too many') || msg.toLowerCase().includes('rate limit')) {
          friendlyMsg = 'Too many failed attempts. Please try again later.';
        } else if (msg.toLowerCase().includes('network') || msg.toLowerCase().includes('fetch')) {
          friendlyMsg = 'Network error. Please check your connection and try again.';
        } else if (msg.toLowerCase().includes('locked') || msg.toLowerCase().includes('disabled')) {
          friendlyMsg = 'This account has been locked. Please contact your administrator.';
        }
        showGlobalError(friendlyMsg);
        submitBtn.disabled = false;
        submitBtn.querySelector('span').textContent = 'Authorize and Enter';
      }
    });
  </script>
</body>

</html>
