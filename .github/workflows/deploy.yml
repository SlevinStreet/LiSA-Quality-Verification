name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v4

      - name: Generate config.js dynamically
        run: |
          echo "window.ENV = {" > config.js
          echo "  INSFORGE_BASE_URL: '${{ secrets.INSFORGE_BASE_URL }}'," >> config.js
          echo "  INSFORGE_ANON_KEY: '${{ secrets.INSFORGE_ANON_KEY }}'" >> config.js
          echo "};" >> config.js

      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4