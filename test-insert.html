<!DOCTYPE html>
<html>
<head>
  <title>LiSA — Test Insert (Dev Tool)</title>
  <style>
    body { font-family: monospace; padding: 24px; background: #0f1117; color: #e5e7eb; }
    h1 { color: #C5A85A; }
    .warning { background: #7f1d1d; border: 1px solid #ef4444; color: #fca5a5;
               padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 13px; }
    label { display: block; margin: 10px 0 4px; font-size: 12px; color: #9ca3af; }
    input { width: 340px; padding: 8px 10px; background: #1f2937; color: #e5e7eb;
            border: 1px solid #374151; border-radius: 4px; font-size: 13px; }
    button { margin-top: 16px; padding: 8px 20px; background: #065f46; color: white;
             border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    button:hover { background: #047857; }
    #status { margin-top: 16px; font-size: 13px; color: #6ee7b7; }
    #output { margin-top: 8px; background: #111827; padding: 12px; border-radius: 4px;
              font-size: 12px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>LiSA Dev: Test Insert</h1>

  <div class="warning">
    ⚠ <strong>Development tool only.</strong> This page requires manual entry of admin credentials.
    Never hardcode credentials in source files — use .env instead.
    Do not deploy this page to production.
  </div>

  <label for="dev-email">Admin Email</label>
  <input type="email" id="dev-email" placeholder="admin@yourdomain.gov">

  <label for="dev-password">Admin Password</label>
  <input type="password" id="dev-password" placeholder="Enter your admin password">

  <button onclick="runTest()">Run Test Insert</button>

  <div id="status"></div>
  <pre id="output"></pre>

  <!-- Config must load before insforge-client -->
  <script src="config.js"></script>
  <script type="module" src="insforge-client.js"></script>
  <script src="state.js"></script>
  <script>
    async function runTest() {
      const email = document.getElementById('dev-email').value.trim();
      const password = document.getElementById('dev-password').value;

      if (!email || !password) {
        document.getElementById('status').textContent = '⚠ Please enter both email and password.';
        return;
      }

      try {
        document.getElementById('status').textContent = 'Logging in...';
        await window.lisaState.loginWithPassword(email, password);

        document.getElementById('status').textContent = 'Inserting test certificate...';
        const certData = {
          manufacturer: "Test Mfg",
          productName: "Test Product",
          origin: "Test Origin",
          serialNumbers: "123",
          status: "VALID",
          issueDate: new Date().toISOString().split("T")[0],
          applicableStandards: "LSA",
          regulations: "LSA",
          scheme: "Scheme",
          scope: "Scope",
          surveillanceInterval: "Annually",
          signatory: "Sig",
          uploadedFileName: "test.pdf"
        };

        const result = await window.lisaState.createCertificateAsync(certData);
        if (result) {
          document.getElementById('status').textContent = '✓ Insert succeeded!';
          document.getElementById('output').textContent = JSON.stringify(result, null, 2);
        } else {
          document.getElementById('status').textContent = 'Insert failed. See console.';
        }
      } catch (e) {
        document.getElementById('status').textContent = 'Error: ' + e.message;
        document.getElementById('output').textContent = e.stack || '';
      }
    }

    // Capture console.error output on screen for easier debugging
    const origErr = console.error;
    console.error = function(...args) {
      document.getElementById('output').textContent += '\nERROR: ' + JSON.stringify(args, null, 2);
      origErr.apply(console, args);
    };
  </script>
</body>
</html>
